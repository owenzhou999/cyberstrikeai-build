name: Build ARM64 Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Get upstream source
        uses: actions/checkout@v4
        with:
          repository: Ed1s0nZ/CyberStrikeAI
          path: upstream
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Install ARM64 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
      
      - name: Compile ARM64 binary with CGO
        working-directory: upstream
        run: |
          go env -w GOPROXY=https://proxy.golang.org,direct
          go mod download
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -o cyberstrike-ai cmd/server/main.go
          file cyberstrike-ai
          ls -lh cyberstrike-ai
      
      - name: Build Docker image (zero RUN, avoids QEMU exit 255)
        run: |
          # 在宿主机（原生 x86_64）准备所有文件和目录
          mkdir -p docker-context/app/data
          mkdir -p docker-context/app/knowledge_base
          cp upstream/cyberstrike-ai docker-context/app/
          cp -r upstream/tools docker-context/app/
          cp -r upstream/roles docker-context/app/
          cp -r upstream/skills docker-context/app/
          cp -r upstream/agents docker-context/app/
          cp -r upstream/web docker-context/app/
          cp config.yaml docker-context/app/
          chmod +x docker-context/app/cyberstrike-ai
          
          # Dockerfile 里只有 COPY + CMD，没有任何 RUN 指令
          # 彻底绕过 QEMU 用户态模拟执行 /bin/sh 的 bug
          cat > docker-context/Dockerfile << 'EOF'
          FROM debian:bookworm-slim
          COPY app /app
          WORKDIR /app
          EXPOSE 8080 8081
          VOLUME ["/app/data", "/app/knowledge_base"]
          CMD ["/app/cyberstrike-ai"]
          EOF
          
          docker buildx build --platform linux/arm64 -t cyberstrikeai:arm64 --load docker-context/
      
      - name: Save and upload
        run: |
          docker save -o cyberstrikeai-arm64.tar cyberstrikeai:arm64
          ls -lh cyberstrikeai-arm64.tar
      
      - uses: actions/upload-artifact@v4
        with:
          name: cyberstrikeai-arm64
          path: cyberstrikeai-arm64.tar
          retention-days: 1
