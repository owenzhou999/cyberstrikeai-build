name: Build ARM64 Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Get upstream source
        uses: actions/checkout@v4
        with:
          repository: Ed1s0nZ/CyberStrikeAI
          path: upstream
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Compile ARM64 binary (native x86_64, no QEMU)
        working-directory: upstream
        run: |
          go env -w GOPROXY=https://proxy.golang.org,direct
          go mod download
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o cyberstrike-ai cmd/server/main.go
          file cyberstrike-ai
          ls -lh cyberstrike-ai
      
      - name: Prepare files on host (zero RUN in Dockerfile)
        run: |
          # 创建目录结构
          mkdir -p app/data app/knowledge_base
          
          # 复制二进制并加权限（在 x86_64 原生环境完成，不依赖 QEMU）
          cp upstream/cyberstrike-ai app/
          chmod +x app/cyberstrike-ai
          
          # 复制项目文件
          cp -r upstream/tools app/
          cp -r upstream/roles app/
          cp -r upstream/skills app/
          cp -r upstream/agents app/
          cp -r upstream/web app/
          cp config.yaml app/
          
          # 验证
          echo "=== 目录结构 ==="
          ls -la app/
          echo "=== 二进制权限 ==="
          ls -la app/cyberstrike-ai
          echo "=== 文件类型 ==="
          file app/cyberstrike-ai
      
      - name: Build ARM64 image (zero RUN instructions, no QEMU crashes)
        run: |
          # 生成极简 Dockerfile：只有 COPY 和 CMD，没有 RUN
          cat > Dockerfile << 'EOF'
          FROM python:3.12-slim-bookworm
          COPY app /app
          WORKDIR /app
          EXPOSE 8080 8081
          VOLUME ["/app/data", "/app/knowledge_base"]
          CMD ["/app/cyberstrike-ai"]
          EOF
          
          # 构建（COPY 在宿主机执行，不触发 QEMU 模拟容器内命令）
          docker buildx build --platform linux/arm64 -t cyberstrikeai:arm64 --load .
      
      - name: Save and upload
        run: |
          docker save -o cyberstrikeai-arm64.tar cyberstrikeai:arm64
          ls -lh cyberstrikeai-arm64.tar
      
      - uses: actions/upload-artifact@v4
        with:
          name: cyberstrikeai-arm64
          path: cyberstrikeai-arm64.tar
          retention-days: 1
