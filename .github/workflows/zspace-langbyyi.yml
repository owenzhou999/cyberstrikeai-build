name: Build AMD64 for ZSpace (langbyyi v1.6.49)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Download v1.6.49-src release
        run: |
          wget https://github.com/langbyyi/CyberStrikeAI-SRC/archive/refs/tags/v1.6.49-src.tar.gz
          tar xzf v1.6.49-src.tar.gz
          mv CyberStrikeAI-SRC-1.6.49-src upstream
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Compile AMD64 binary
        working-directory: upstream
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct
          go mod download
          go build -o cyberstrike-ai cmd/server/main.go
          file cyberstrike-ai
      
      - name: Build Docker image
        run: |
          mkdir -p docker-context
          cp upstream/cyberstrike-ai docker-context/
          cp -r upstream/tools docker-context/
          cp -r upstream/roles docker-context/
          cp -r upstream/skills docker-context/
          cp -r upstream/agents docker-context/
          cp -r upstream/web docker-context/
          
          cat > docker-context/config.yaml << 'EOF'
          auth:
            password: "owenzhou999"
            session_duration_hours: 12
          server:
            host: "0.0.0.0"
            port: 8080
          log:
            level: "warn"
            output: "stdout"
          mcp:
            enabled: true
            host: "0.0.0.0"
            port: 8081
            auth_header: "X-MCP-Token"
            auth_header_value: ""
          openai:
            api_key: "sk-9imX6BUvJXJ3t5U8QQYsH0kpgkSb9tvOKds98QLYFgN0pMx2"
            base_url: "https://api.moonshot.cn/v1"
            model: "moonshot-v1-8k"
          database:
            path: "data/conversations.db"
            knowledge_db_path: "data/knowledge.db"
          security:
            tools_dir: "tools"
          knowledge:
            enabled: false
          roles_dir: "roles"
          skills_dir: "skills"
          agents_dir: "agents"
          multi_agent:
            enabled: false
            default_mode: "eino_single"
          project:
            enabled: true
            fact_index_max_runes: 65000
            fact_summary_max_runes: 24000
          EOF
          
          cat > docker-context/Dockerfile << 'EOF'
          FROM python:3.12-slim-bookworm
          WORKDIR /app
          COPY cyberstrike-ai /app/cyberstrike-ai
          COPY tools /app/tools
          COPY roles /app/roles
          COPY skills /app/skills
          COPY agents /app/agents
          COPY web /app/web
          COPY config.yaml /app/config.yaml
          RUN mkdir -p /app/data /app/knowledge_base && chmod +x /app/cyberstrike-ai
          EXPOSE 8080 8081
          VOLUME ["/app/data", "/app/knowledge_base"]
          CMD ["/app/cyberstrike-ai"]
          EOF
          
          docker build -t cyberstrikeai:amd64 docker-context/
      
      - name: Save and upload
        run: |
          docker save -o cyberstrikeai-amd64.tar cyberstrikeai:amd64
          ls -lh cyberstrikeai-amd64.tar
      
      - uses: actions/upload-artifact@v4
        with:
          name: cyberstrikeai-amd64
          path: cyberstrikeai-amd64.tar
          retention-days: 1
